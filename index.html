<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro 3D Endless Runner - Three.js WebGL Engine</title>
  <style>
    /* Reset & Fullscreen Layout */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: 'Courier New', Courier, monospace;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    /* Matrix Terminal HUD Overlay */
    #ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ff66;
      text-shadow: 0 0 8px rgba(0, 255, 102, 0.6), 0 0 16px rgba(0, 255, 102, 0.3);
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    #ui-overlay h1 {
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    #ui-overlay p {
      font-size: 12px;
      color: #00cc55;
      text-shadow: 0 0 6px rgba(0, 204, 85, 0.6);
    }
    /* Top-Center Score Counter */
    #score-display {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #00ff66;
      text-shadow: 0 0 10px rgba(0, 255, 102, 0.8), 0 0 20px rgba(0, 255, 102, 0.4);
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    #score-display .label {
      font-size: 12px;
      letter-spacing: 3px;
      color: #00cc55;
      text-shadow: 0 0 6px rgba(0, 204, 85, 0.6);
    }
    #score-display .value {
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    #speed-indicator {
      font-size: 11px;
      color: #00bb44;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    /* Top-Right Lives Counter */
    #lives-display {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #00ff66;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 255, 102, 0.8);
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    /* Classic Arcade Game Over Center Overlay */
    #game-over-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      pointer-events: none;
      user-select: none;
      z-index: 20;
    }
    #game-over-screen h2 {
      font-size: 64px;
      color: #00ff66;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(0, 255, 102, 0.9), 0 0 40px rgba(0, 255, 102, 0.6);
      margin-bottom: 12px;
      animation: pulse 1.2s infinite alternate ease-in-out;
    }
    #game-over-screen p {
      font-size: 20px;
      color: #00cc55;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0, 204, 85, 0.8);
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); }
    }
    /* Active Power-Ups Banner */
    #powerup-display {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    .powerup-badge {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid #00ff66;
      box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge-shield {
      color: #00ffff;
      border-color: #00ffff;
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.7);
    }
    .badge-rapid {
      color: #ff8800;
      border-color: #ff8800;
      box-shadow: 0 0 12px rgba(255, 136, 0, 0.7);
    }
  </style>
  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui-overlay">
    <h1>MATRIX RUNNER 3D</h1>
    <p>CONTROLS: [A / D] STEER | [SPACE] SHOOT LASER</p>
  </div>

  <div id="score-display">
    <div class="label">SCORE</div>
    <div class="value" id="scoreValue">000000</div>
    <div id="speed-indicator">SPEED: 100%</div>
  </div>

  <div id="lives-display">LIVES: 3</div>
  <div id="powerup-display"></div>

  <div id="game-over-screen">
    <h2>GAME OVER</h2>
    <p>Press 'R' to RESTART</p>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script>
    /**
     * RETRO 3D ENDLESS RUNNER - THREE.JS WEBGL ENGINE
     * Fresh Asset Texture Reload (assets/jet.png & assets/alien.png) with alphaTest: 0.5 Cutout
     */

    // --- ENGINE & DOM SETUP ---
    const scoreValueEl = document.getElementById('scoreValue');
    const speedIndicatorEl = document.getElementById('speed-indicator');
    const livesDisplayEl = document.getElementById('lives-display');
    const gameOverScreenEl = document.getElementById('game-over-screen');
    const powerupDisplayEl = document.getElementById('powerup-display');

    // --- GAME STATE ---
    const gameState = {
      gameOver: false,
      score: 0,
      baseSpeed: 380,
      currentSpeed: 380,
      speedMultiplier: 1.0,
      timeElapsed: 0,
      accelInterval: 10,
      lastAccelTime: 0,
      playerLives: 3,
      invincibleTimer: 0,
      shieldActive: false,
      shieldTimer: 0,
      rapidFireActive: false,
      rapidFireTimer: 0
    };

    // --- THREE.JS SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.0016);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 35, 170);
    camera.lookAt(0, 10, 0);

    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('gameCanvas'),
      antialias: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    function handleResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', handleResize);

    // --- LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0x1a241c, 2.0);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0x00ff66, 1.5);
    dirLight.position.set(0, 120, -50);
    scene.add(dirLight);

    // --- INFINITE MATRIX GRID ---
    const gridGroup = new THREE.Group();
    const gridHelper1 = new THREE.GridHelper(2400, 40, 0x00ff66, 0x006622);
    gridHelper1.position.z = 0;
    gridGroup.add(gridHelper1);

    const gridHelper2 = new THREE.GridHelper(2400, 40, 0x00ff66, 0x006622);
    gridHelper2.position.z = -2400;
    gridGroup.add(gridHelper2);

    scene.add(gridGroup);

    function updateGrid(dt) {
      if (gameState.gameOver) return;
      gridGroup.position.z += gameState.currentSpeed * dt;
      if (gridGroup.position.z >= 60) {
        gridGroup.position.z %= 60;
      }
    }

    // --- RETRO WEB AUDIO SOUND SYNTHESIZER ENGINE (0 EXTERNAL ASSETS) ---
    const soundManager = {
      ctx: null,

      init() {
        if (!this.ctx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (AudioCtx) {
            this.ctx = new AudioCtx();
          }
        }
        if (this.ctx && this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      },

      playLaser(isRapid = false) {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = isRapid ? 'sawtooth' : 'triangle';
        const startFreq = isRapid ? 980 : 850;
        const endFreq = isRapid ? 320 : 180;
        const duration = isRapid ? 0.06 : 0.12;

        osc.frequency.setValueAtTime(startFreq, now);
        osc.frequency.exponentialRampToValueAtTime(endFreq, now + duration);

        gain.gain.setValueAtTime(isRapid ? 0.12 : 0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.start(now);
        osc.stop(now + duration);
      },

      playExplosion() {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const duration = 0.35;

        // White Noise Buffer Generator
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = Math.random() * 2 - 1;
        }

        const whiteNoise = this.ctx.createBufferSource();
        whiteNoise.buffer = buffer;

        // Low Pass Filter Sweep
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, now);
        filter.frequency.exponentialRampToValueAtTime(50, now + duration);

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.35, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        whiteNoise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);

        whiteNoise.start(now);
        whiteNoise.stop(now + duration);

        // Low Bass Kick Pulse
        const osc = this.ctx.createOscillator();
        const bassGain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(140, now);
        osc.frequency.exponentialRampToValueAtTime(30, now + duration);
        bassGain.gain.setValueAtTime(0.4, now);
        bassGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.connect(bassGain);
        bassGain.connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      },

      playPowerUp() {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6 arpeggio
        const noteDuration = 0.05;

        notes.forEach((freq, index) => {
          const startTime = now + index * noteDuration;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();

          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, startTime);

          gain.gain.setValueAtTime(0.15, startTime);
          gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration);

          osc.connect(gain);
          gain.connect(this.ctx.destination);

          osc.start(startTime);
          osc.stop(startTime + noteDuration);
        });
      },

      playShieldHit() {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const duration = 0.2;

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
        osc.frequency.exponentialRampToValueAtTime(200, now + duration);

        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.start(now);
        osc.stop(now + duration);
      },

      playGameOver() {
        this.init();
        if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const notes = [392.00, 311.13, 261.63, 196.00]; // G4, Eb4, C4, G3 descending sad arpeggio
        const noteDuration = 0.26;

        notes.forEach((freq, index) => {
          const startTime = now + index * noteDuration;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();

          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, startTime);
          osc.frequency.exponentialRampToValueAtTime(freq * 0.95, startTime + noteDuration);

          gain.gain.setValueAtTime(0.25, startTime);
          gain.gain.exponentialRampToValueAtTime(0.001, startTime + noteDuration);

          osc.connect(gain);
          gain.connect(this.ctx.destination);

          osc.start(startTime);
          osc.stop(startTime + noteDuration);
        });
      }
    };

    // --- INPUT SYSTEM ---
    const keys = { left: false, right: false, space: false };

    window.addEventListener('keydown', (e) => {
      soundManager.init();
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
      if (e.code === 'Space') {
        keys.space = true;
        if (!gameState.gameOver) laserManager.fire();
      }
      if (e.code === 'KeyR' && gameState.gameOver) {
        resetGame();
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
      if (e.code === 'Space') keys.space = false;
    });

    // --- SOFT RADIAL GLOW TEXTURE GENERATOR FOR HOVERING ALIEN AURA ---
    function createSoftGlowTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      gradient.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
      gradient.addColorStop(0.25, 'rgba(255, 255, 255, 0.7)');
      gradient.addColorStop(0.6, 'rgba(255, 255, 255, 0.2)');
      gradient.addColorStop(1, 'rgba(255, 255, 255, 0.0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(canvas);
    }
    const softGlowTexture = createSoftGlowTexture();

    // --- INLINE BASE64 ASSET TEXTURE LOADER (CORS-SAFE & OFFLINE READY) ---

    const textureLoader = new THREE.TextureLoader();

    // Player Jet Texture
    const jetTexture = textureLoader.load(JET_BASE64);
    const jetSpriteMaterial = new THREE.SpriteMaterial({ 
      map: jetTexture, 
      transparent: true,
      alphaTest: 0.1
    });

    // Enemy Alien Monster Texture
    const alienTexture = textureLoader.load(ALIEN_BASE64);
    const alienSpriteMaterial = new THREE.SpriteMaterial({ 
      map: alienTexture, 
      transparent: true,
      alphaTest: 0.1
    });

    // --- PLAYER FIGHTER JET SYSTEM ---
    const player = {
      group: new THREE.Group(),
      shieldMesh: null,
      vx: 0,
      accel: 3000,
      friction: 9.0,
      boundaryX: 420,
      width: 38,
      height: 14,
      depth: 36,

      init() {
        const sprite = new THREE.Sprite(jetSpriteMaterial);
        sprite.scale.set(46, 46, 1);
        sprite.position.set(0, 4, 0);
        this.group.add(sprite);

        const redEngineLight = new THREE.PointLight(0xff0033, 4.0, 140);
        redEngineLight.position.set(0, 0, -10);
        this.group.add(redEngineLight);

        const shieldGeo = new THREE.SphereGeometry(32, 24, 24);
        const shieldMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.7 });
        this.shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
        this.shieldMesh.position.set(0, 4, 0);
        this.shieldMesh.visible = false;
        this.group.add(this.shieldMesh);

        this.group.position.set(0, 0, 110);
        scene.add(this.group);
      },

      reset() {
        this.group.position.set(0, 0, 110);
        this.group.rotation.set(0, 0, 0);
        this.vx = 0;
        camera.position.x = 0;
        camera.rotation.z = 0;
      },

      update(dt) {
        if (gameState.gameOver) return;

        if (gameState.shieldActive) {
          gameState.shieldTimer -= dt;
          if (this.shieldMesh) this.shieldMesh.rotation.y += dt * 2.5;
          if (gameState.shieldTimer <= 0) {
            gameState.shieldActive = false;
            gameState.shieldTimer = 0;
            if (this.shieldMesh) this.shieldMesh.visible = false;
          }
        }
        if (gameState.rapidFireActive) {
          gameState.rapidFireTimer -= dt;
          if (gameState.rapidFireTimer <= 0) {
            gameState.rapidFireActive = false;
            gameState.rapidFireTimer = 0;
          }
        }
        updatePowerUpHUD();

        if (gameState.invincibleTimer > 0) {
          gameState.invincibleTimer -= dt;
          if (gameState.invincibleTimer <= 0) {
            gameState.invincibleTimer = 0;
            this.group.visible = true;
          } else {
            this.group.visible = (Math.floor(gameState.invincibleTimer * 14) % 2 === 0);
          }
        }

        let dir = 0;
        if (keys.left) dir -= 1;
        if (keys.right) dir += 1;

        this.vx += dir * this.accel * dt;
        this.vx -= this.vx * this.friction * dt;
        this.group.position.x += this.vx * dt;

        if (this.group.position.x < -this.boundaryX) {
          this.group.position.x = -this.boundaryX;
          this.vx = 0;
        }
        if (this.group.position.x > this.boundaryX) {
          this.group.position.x = this.boundaryX;
          this.vx = 0;
        }

        const targetRoll = (-this.vx / 800) * 0.35;
        this.group.rotation.z += (targetRoll - this.group.rotation.z) * 12 * dt;

        camera.position.x += (this.group.position.x * 0.5 - camera.position.x) * 6 * dt;
        camera.rotation.z += (-this.group.rotation.z * 0.35 - camera.rotation.z) * 8 * dt;
      }
    };
    player.init();

    // --- ALIEN MONSTER MANAGER ---
    const alienManager = {
      aliens: [],
      spawnTimer: 0,
      spawnInterval: 0.22,
      alienSize: 38,

      reset() {
        for (const alien of this.aliens) {
          scene.remove(alien.meshGroup);
        }
        this.aliens = [];
        this.spawnTimer = 0;
      },

      createAlienMeshGroup() {
        const group = new THREE.Group();

        // 1. Hovering Soft Glow Particle Sprite (Additive Blending, behind alien)
        const glowMat = new THREE.SpriteMaterial({
          map: softGlowTexture,
          color: 0x00ff66,
          transparent: true,
          opacity: 0.5,
          blending: THREE.AdditiveBlending
        });
        const glowSprite = new THREE.Sprite(glowMat);
        glowSprite.scale.set(64, 64, 1);
        glowSprite.position.set(0, 16, -2);
        group.add(glowSprite);

        // 2. Main Eyeball Monster Sprite
        const sprite = new THREE.Sprite(alienSpriteMaterial);
        sprite.scale.set(38, 38, 1);
        sprite.position.set(0, 16, 0);
        group.add(sprite);

        // 3. Ambient Point Light for Scene Lighting
        const glowLight = new THREE.PointLight(0x00ff66, 2.2, 100);
        glowLight.position.set(0, 16, 0);
        group.add(glowLight);

        group.userData = {
          glowSprite: glowSprite,
          glowMat: glowMat,
          glowLight: glowLight
        };

        return group;
      },

      spawnAlien() {
        const spawnX = (Math.random() - 0.5) * 880;
        const meshGroup = this.createAlienMeshGroup();
        meshGroup.position.set(spawnX, 0, -1050);
        scene.add(meshGroup);

        this.aliens.push({
          meshGroup: meshGroup,
          x: spawnX,
          y: 0,
          z: -1050,
          hp: 2,
          isRed: false
        });
      },

      update(dt) {
        if (gameState.gameOver) return;

        this.spawnTimer += dt;
        const currentInterval = this.spawnInterval / (gameState.speedMultiplier * 0.85);
        if (this.spawnTimer >= currentInterval) {
          this.spawnTimer = 0;
          this.spawnAlien();
        }

        for (let i = this.aliens.length - 1; i >= 0; i--) {
          const alien = this.aliens[i];
          alien.z += gameState.currentSpeed * dt;
          alien.meshGroup.position.z = alien.z;

          // Soft floating aura pulse animation
          if (alien.meshGroup.userData.glowSprite) {
            const pulseScale = 64 + Math.sin(performance.now() * 0.008 + alien.x) * 6;
            alien.meshGroup.userData.glowSprite.scale.set(pulseScale, pulseScale, 1);
          }

          // 1. Laser Collisions
          for (let j = laserManager.lasers.length - 1; j >= 0; j--) {
            const laser = laserManager.lasers[j];

            if (checkLaserCollision(laser, alien, this.alienSize)) {
              scene.remove(laser.mesh);
              laserManager.lasers.splice(j, 1);

              alien.hp -= 1;

              // Turn Soft Hovering Glow RED on Hit!
              alien.isRed = true;
              if (alien.meshGroup.userData.glowMat) {
                alien.meshGroup.userData.glowMat.color.setHex(0xff0022);
                alien.meshGroup.userData.glowMat.opacity = 0.85;
              }
              if (alien.meshGroup.userData.glowLight) {
                alien.meshGroup.userData.glowLight.color.setHex(0xff0022);
              }

              particleSystem.explode(alien.x, alien.y + 16, alien.z, 0xff0022);
              soundManager.playExplosion();

              if (alien.hp <= 0) {
                particleSystem.explode(alien.x, alien.y + 16, alien.z, 0xff0022);
                scene.remove(alien.meshGroup);
                this.aliens.splice(i, 1);

                gameState.score += 500;
                scoreValueEl.textContent = String(gameState.score).padStart(6, '0');
              }
              break;
            }
          }

          if (!this.aliens[i]) continue;

          // 2. Player Ship Collisions
          if (gameState.invincibleTimer <= 0 && checkCollision(player.group.position, alien, this.alienSize)) {
            particleSystem.explode(alien.x, alien.y + 16, alien.z);
            scene.remove(alien.meshGroup);
            this.aliens.splice(i, 1);

            if (gameState.shieldActive) {
              gameState.shieldActive = false;
              gameState.shieldTimer = 0;
              if (player.shieldMesh) player.shieldMesh.visible = false;
              gameState.invincibleTimer = 1.0;
              soundManager.playShieldHit();
            } else {
              soundManager.playExplosion();
              gameState.playerLives -= 1;
              livesDisplayEl.textContent = `LIVES: ${gameState.playerLives}`;

              if (gameState.playerLives <= 0) {
                triggerGameOver();
              } else {
                player.reset();
                gameState.invincibleTimer = 2.0;
              }
            }
          }

          // 3. Despawn if passed camera
          if (alien.z > 200) {
            scene.remove(alien.meshGroup);
            this.aliens.splice(i, 1);
          }
        }
      }
    };

    // --- 3D LASER CANNON SYSTEM ---
    const laserManager = {
      lasers: [],
      cooldown: 0,
      cooldownInterval: 0.14,
      speed: 1900,
      laserGeo: new THREE.CylinderGeometry(1.2, 1.2, 40, 8),
      laserMat: new THREE.MeshBasicMaterial({ color: 0x00ff66 }),

      reset() {
        for (const laser of this.lasers) {
          scene.remove(laser.mesh);
        }
        this.lasers = [];
        this.cooldown = 0;
      },

      fire() {
        if (this.cooldown > 0) return;
        this.cooldown = gameState.rapidFireActive ? 0.05 : this.cooldownInterval;

        const hardpointsX = gameState.rapidFireActive ? [-24, -10, 10, 24] : [-16, 16];
        const laserMatToUse = gameState.rapidFireActive ? new THREE.MeshBasicMaterial({ color: 0xff6600 }) : this.laserMat;
        const startY = player.group.position.y + 2;
        const startZ = player.group.position.z - 20;

        soundManager.playLaser(gameState.rapidFireActive);
        hardpointsX.forEach(offsetX => {
          const posX = player.group.position.x + offsetX;
          const mesh = new THREE.Mesh(this.laserGeo, laserMatToUse);
          mesh.rotation.x = Math.PI / 2;
          mesh.position.set(posX, startY, startZ);

          scene.add(mesh);
          this.lasers.push({
            mesh: mesh,
            x: posX,
            y: startY,
            z: startZ,
            length: 40
          });
        });
      },

      update(dt) {
        if (this.cooldown > 0) this.cooldown -= dt;
        if (gameState.gameOver) return;
        if (keys.space && gameState.rapidFireActive) {
          this.fire();
        }

        for (let i = this.lasers.length - 1; i >= 0; i--) {
          const laser = this.lasers[i];
          laser.z -= this.speed * dt;
          laser.mesh.position.z = laser.z;

          if (laser.z < -1200) {
            scene.remove(laser.mesh);
            this.lasers.splice(i, 1);
          }
        }
      }
    };

    // --- 3D PARTICLE EXPLOSION SYSTEM ---
    const particleSystem = {
      particles: [],

      reset() {
        for (const p of this.particles) {
          scene.remove(p.mesh);
        }
        this.particles = [];
      },

      explode(originX, originY, originZ, colorHex = 0x00ff66) {
        const count = 45;
        const pGeo = new THREE.BoxGeometry(2.5, 2.5, 2.5);
        const pMat = new THREE.MeshBasicMaterial({ color: colorHex });

        for (let i = 0; i < count; i++) {
          const mesh = new THREE.Mesh(pGeo, pMat);
          mesh.position.set(originX, originY, originZ);
          scene.add(mesh);

          const theta = Math.random() * Math.PI * 2;
          const phi = (Math.random() - 0.5) * Math.PI;
          const speed = 200 + Math.random() * 400;

          this.particles.push({
            mesh: mesh,
            vx: Math.cos(theta) * Math.cos(phi) * speed,
            vy: Math.sin(phi) * speed + 50,
            vz: Math.sin(theta) * Math.cos(phi) * speed,
            life: 1.0,
            decay: 0.7 + Math.random() * 0.8
          });
        }
      },

      update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          p.mesh.position.x += p.vx * dt;
          p.mesh.position.y += p.vy * dt;
          p.mesh.position.z += p.vz * dt;
          p.life -= p.decay * dt;
          p.mesh.scale.setScalar(Math.max(0, p.life));

          if (p.life <= 0) {
            scene.remove(p.mesh);
            this.particles.splice(i, 1);
          }
        }
      }
    };

    // --- POWER-UPS & SHIELDS MANAGER ---
    function checkPickupCollision(playerPos, pickup, pickupSize) {
      const halfP = pickupSize / 2;
      const halfPW = player.width / 2;
      const halfPD = player.depth / 2;
      const overlapX = Math.abs(playerPos.x - pickup.x) < (halfPW + halfP);
      const overlapZ = Math.abs(playerPos.z - pickup.z) < (halfPD + halfP);
      return overlapX && overlapZ;
    }

    function updatePowerUpHUD() {
      let badges = '';
      if (gameState.shieldActive) {
        badges += `<div class="powerup-badge badge-shield">🛡️ SHIELD: ${Math.max(0, gameState.shieldTimer).toFixed(1)}s</div>`;
      }
      if (gameState.rapidFireActive) {
        badges += `<div class="powerup-badge badge-rapid">⚡ RAPID FIRE: ${Math.max(0, gameState.rapidFireTimer).toFixed(1)}s</div>`;
      }
      powerupDisplayEl.innerHTML = badges;
    }

    const powerUpManager = {
      powerUps: [],
      spawnTimer: 0,
      spawnInterval: 7.5,
      pickupSize: 36,

      reset() {
        for (const p of this.powerUps) {
          scene.remove(p.meshGroup);
        }
        this.powerUps = [];
        this.spawnTimer = 0;
      },

      createPowerUpMeshGroup(type) {
        const group = new THREE.Group();
        let geo, mat, lightColor;
        if (type === 'shield') {
          geo = new THREE.IcosahedronGeometry(14, 0);
          mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaaa, roughness: 0.2 });
          lightColor = 0x00ffff;
        } else if (type === 'rapid') {
          geo = new THREE.OctahedronGeometry(14, 0);
          mat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xcc4400, roughness: 0.2 });
          lightColor = 0xff6600;
        } else { // bomb
          geo = new THREE.TorusGeometry(12, 4, 12, 24);
          mat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xcc9900, roughness: 0.2 });
          lightColor = 0xffd700;
        }

        const mesh = new THREE.Mesh(geo, mat);
        group.add(mesh);

        const light = new THREE.PointLight(lightColor, 2.5, 90);
        group.add(light);

        return group;
      },

      spawnPowerUp() {
        const types = ['shield', 'rapid', 'bomb'];
        const type = types[Math.floor(Math.random() * types.length)];
        const spawnX = (Math.random() - 0.5) * 800;
        const meshGroup = this.createPowerUpMeshGroup(type);
        meshGroup.position.set(spawnX, 12, -1050);
        scene.add(meshGroup);

        this.powerUps.push({
          type: type,
          meshGroup: meshGroup,
          x: spawnX,
          y: 12,
          z: -1050
        });
      },

      update(dt) {
        if (gameState.gameOver) return;
        this.spawnTimer += dt;
        if (this.spawnTimer >= this.spawnInterval) {
          this.spawnTimer = 0;
          this.spawnPowerUp();
        }

        for (let i = this.powerUps.length - 1; i >= 0; i--) {
          const p = this.powerUps[i];
          p.z += gameState.currentSpeed * dt;
          p.meshGroup.position.z = p.z;
          p.meshGroup.rotation.x += dt * 2;
          p.meshGroup.rotation.y += dt * 3;

          // Check Player Pickup Collision
          if (checkPickupCollision(player.group.position, p, this.pickupSize)) {
            particleSystem.explode(p.x, p.y, p.z);
            scene.remove(p.meshGroup);
            this.powerUps.splice(i, 1);
            soundManager.playPowerUp();

            if (p.type === 'shield') {
              gameState.shieldActive = true;
              gameState.shieldTimer = 8.0;
              if (player.shieldMesh) player.shieldMesh.visible = true;
            } else if (p.type === 'rapid') {
              gameState.rapidFireActive = true;
              gameState.rapidFireTimer = 7.0;
            } else if (p.type === 'bomb') {
              let clearedCount = alienManager.aliens.length;
              for (const alien of alienManager.aliens) {
                particleSystem.explode(alien.x, alien.y + 16, alien.z);
                scene.remove(alien.meshGroup);
              }
              soundManager.playExplosion();
              alienManager.aliens = [];
              gameState.score += clearedCount * 500 + 1500;
              scoreValueEl.textContent = String(gameState.score).padStart(6, '0');
            }
            continue;
          }

          if (p.z > 200) {
            scene.remove(p.meshGroup);
            this.powerUps.splice(i, 1);
          }
        }
      }
    };

    // --- COLLISION DETECTION MATH ---
    function checkLaserCollision(laser, alien, aSize) {
      const halfA = aSize / 2;
      const overlapX = Math.abs(laser.x - alien.x) < (halfA + 10);
      const overlapY = true;
      const overlapZ = Math.abs(laser.z - alien.z) < (halfA + 20);

      return overlapX && overlapY && overlapZ;
    }

    function checkCollision(playerPos, alien, aSize) {
      const halfA = aSize / 2;
      const halfPW = player.width / 2;
      const halfPD = player.depth / 2;

      const overlapX = Math.abs(playerPos.x - alien.x) < (halfPW + halfA);
      const overlapY = true;
      const overlapZ = Math.abs(playerPos.z - alien.z) < (halfPD + halfA);

      return overlapX && overlapY && overlapZ;
    }

    // --- GAME PROGRESSION & OVERLAY LOGIC ---
    function updateProgression(dt) {
      if (gameState.gameOver) return;

      gameState.timeElapsed += dt;
      gameState.score += Math.floor(gameState.currentSpeed * dt * 0.2);
      scoreValueEl.textContent = String(gameState.score).padStart(6, '0');

      if (gameState.timeElapsed - gameState.lastAccelTime >= gameState.accelInterval) {
        gameState.lastAccelTime = gameState.timeElapsed;
        gameState.speedMultiplier += 0.12;
        gameState.currentSpeed = gameState.baseSpeed * gameState.speedMultiplier;
        speedIndicatorEl.textContent = `SPEED: ${Math.round(gameState.speedMultiplier * 100)}%`;
      }
    }

    function triggerGameOver() {
      if (gameState.gameOver) return;
      gameState.gameOver = true;
      gameOverScreenEl.style.display = 'block';

      particleSystem.explode(player.group.position.x, player.group.position.y + 4, player.group.position.z);
      soundManager.playExplosion();
      soundManager.playGameOver();
      player.group.visible = false;
    }

    function resetGame() {
      gameState.gameOver = false;
      gameState.score = 0;
      gameState.currentSpeed = gameState.baseSpeed;
      gameState.speedMultiplier = 1.0;
      gameState.timeElapsed = 0;
      gameState.lastAccelTime = 0;
      gameState.playerLives = 3;
      gameState.invincibleTimer = 0;
      gameState.shieldActive = false;
      gameState.shieldTimer = 0;
      gameState.rapidFireActive = false;
      gameState.rapidFireTimer = 0;

      if (player.shieldMesh) player.shieldMesh.visible = false;

      scoreValueEl.textContent = '000000';
      speedIndicatorEl.textContent = 'SPEED: 100%';
      livesDisplayEl.textContent = 'LIVES: 3';
      gameOverScreenEl.style.display = 'none';

      player.group.visible = true;
      player.reset();
      alienManager.reset();
      laserManager.reset();
      powerUpManager.reset();
      particleSystem.reset();
      updatePowerUpHUD();
    }

    // --- GAME LOOP ---
    let lastTime = performance.now();

    function gameLoop(currentTime) {
      const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
      lastTime = currentTime;

      // 1. Update Game Engine Logic
      updateProgression(dt);
      updateGrid(dt);
      player.update(dt);
      laserManager.update(dt);
      alienManager.update(dt);
      powerUpManager.update(dt);
      particleSystem.update(dt);

      // 2. Render WebGL Scene
      renderer.render(scene, camera);

      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
